name: Update Truth
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Debug and Fetch
        run: |
          # Download the data
          curl -s "https://ix.cnn.io/data/truth-social/truth_archive.json" > data.json
          
          # Print the first 200 characters to the log so we can see the format
          echo "--- JSON PREVIEW ---"
          head -c 200 data.json
          echo -e "\n--- END PREVIEW ---"
          
          # Attempt to grab the first item and its keys
          echo "--- AVAILABLE KEYS ---"
          jq -r '.[0] | keys' data.json
          echo -e "\n--- END KEYS ---"
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git commit -m "Update debug data" || echo "No changes"
          git push
