name: Update Truth
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and Debug
        run: |
          # Use -v to see headers/errors, and save output to a file
          curl -v -s "https://ix.cnn.io/data/truth-social/truth_archive.json" > raw.json 2> curl_errors.txt
          
          # Print the errors to the log so you can see them
          echo "--- CURL ERRORS ---"
          cat curl_errors.txt
          
          # Check if the file is empty
          if [ ! -s raw.json ]; then
            echo "ERROR: raw.json is empty."
            exit 1
          fi
          
          # Attempt to parse
          jq -r '.[0].content // "No content found"' raw.json > latest.txt
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latest.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update" && git push)
