name: Update Truth
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and Clean
        run: |
          # Fetch the JSON and save to a temporary file
          curl -s "https://ix.cnn.io/data/truth-social/truth_archive.json" > raw.json
          
          # Extract the 'content' field from the first post
          # Use 'try/catch' logic in jq to avoid exiting with 1 if data is missing
          jq -r '.[0].content // "No data available"' raw.json | \
          sed 's/<[^>]*>//g' | \
          cut -c 1-200 > latest.txt
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latest.txt
          # Only commit if the file has content and has changed
          if [ -s latest.txt ]; then
            git diff --quiet && git diff --staged --quiet || (git commit -m "Update latest truth" && git push)
          fi
