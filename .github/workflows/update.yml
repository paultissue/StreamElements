name: Update Truth
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and Clean
        run: |
          # Fetch JSON, extract the 'content' field, strip HTML, truncate to 200 chars
          curl -s "https://ix.cnn.io/data/truth-social/truth_archive.json" | \
          jq -r '.[0].content' | \
          sed 's/<[^>]*>//g' | \
          cut -c 1-200 > latest.txt
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add latest.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update latest truth" && git push)
